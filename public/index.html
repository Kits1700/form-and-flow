<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Form & Flow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,300;0,400;0,600;0,700;0,800;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- HOME ─────────────────────────────────────── -->
<div id="s-home" class="screen active">
  <div class="home-hero">
    <div class="home-logo">Form &amp; Flow</div>
    <p class="home-sub">Dumbbells · Home · Fat loss + muscle</p>
  </div>

  <!-- WHOOP card — hidden until connected -->
  <div id="whoop-card" class="whoop-card" style="display:none">
    <div class="whoop-hdr">
      <span class="whoop-logo">W</span>
      <span class="whoop-title" id="whoop-date">Today</span>
      <button class="whoop-refresh-btn" id="whoop-refresh-btn" onclick="whoopRefresh()">↻</button>
      <button class="whoop-disconnect" onclick="whoopDisconnect()">Disconnect</button>
    </div>
    <div class="track-score" id="track-score" style="display:none"></div>
    <div class="whoop-note" id="whoop-note"></div>
    <div class="whoop-metric-grid" id="whoop-metric-grid"></div>
  </div>
  <div id="whoop-connect-wrap" class="whoop-connect-wrap">
    <button class="whoop-connect-btn" onclick="whoopConnect()">Connect Whoop</button>
  </div>

  <!-- Generate / Today's workout -->
  <div class="generate-section">
    <div id="today-workout-card" style="display:none"></div>
    <button id="generate-btn" class="generate-btn" onclick="generateWorkout()">Generate Today's Workout</button>
    <div id="generate-loading" class="generate-loading" style="display:none">
      <div class="generate-spinner"></div>
      <span>Designing your workout...</span>
    </div>
  </div>

  <!-- Steps logger -->
  <div class="steps-row" id="steps-row" onclick="stepsSetMode('edit')">
    <div class="steps-left">
      <span class="steps-label">Steps today</span>
      <span class="steps-val" id="steps-val">—</span>
      <span class="steps-edit-hint" id="steps-edit-hint" style="display:none">Tap to edit</span>
    </div>
    <div class="steps-right" id="steps-input-wrap">
      <input class="steps-input" id="steps-input" type="number" inputmode="numeric" placeholder="0" min="0" max="99999" onclick="event.stopPropagation()" />
      <button class="steps-save-btn" onclick="event.stopPropagation(); saveSteps()">Log</button>
    </div>
  </div>

  <button class="home-cal-row" onclick="openCalendar()">
    <span class="home-cal-label">Workout log</span>
    <span class="home-cal-arr">→</span>
  </button>
</div>

<!-- DAY VIEW ─────────────────────────────────── -->
<div id="s-day" class="screen">
  <div class="day-header">
    <button class="back-btn" onclick="show('s-home')">←</button>
    <div>
      <div id="day-label" class="day-hdr-label">Day A</div>
      <div id="day-name" class="day-hdr-name">Lower body + Push</div>
    </div>
    <button class="start-day-btn" onclick="startWorkout()">Start →</button>
  </div>
  <div id="day-exercise-list" class="exercise-list"></div>
</div>

<!-- WORKOUT MODE ─────────────────────────────── -->
<div id="s-workout" class="screen">
  <div class="wk-header">
    <button class="back-btn" onclick="confirmQuit()">✕</button>
    <div class="wk-progress-wrap">
      <div class="wk-progress-bar">
        <div class="wk-progress-fill" id="wk-prog-fill"></div>
      </div>
      <div class="wk-progress-text" id="wk-prog-text">Exercise 1 of 7</div>
    </div>
    <div class="wk-elapsed" id="wk-elapsed">0:00</div>
  </div>

  <div class="wk-body" id="wk-body">
    <!-- filled by JS -->
  </div>

  <div class="wk-footer">
    <div class="wk-footer-row1">
      <div class="wk-set-info">
        <div class="wk-set-label">Set</div>
        <div class="wk-set-num" id="wk-set-num">1 / 3</div>
      </div>
      <div class="wk-weight-wrap">
        <button class="wk-w-btn" onclick="adjustWeight(-1)">−</button>
        <div class="wk-weight-display">
          <span class="wk-weight-num" id="wk-weight-num">0</span>
          <span class="wk-weight-label">kg</span>
        </div>
        <button class="wk-w-btn" onclick="adjustWeight(1)">+</button>
      </div>
      <button class="wk-done-btn" id="wk-done-btn" onclick="doneSet()">Done ✓</button>
    </div>
    <div class="wk-footer-row2">
      <div class="wk-counter-wrap" id="wk-counter-wrap">
        <button class="wk-minus" onclick="adjustRep(-1)">−</button>
        <div class="wk-rep-display">
          <div class="wk-rep-num" id="wk-rep-num">0</div>
          <div class="wk-rep-label">reps</div>
        </div>
        <button class="wk-plus" onclick="adjustRep(1)">+</button>
      </div>
      <div class="wk-timer-wrap" id="wk-timer-wrap" style="display:none">
        <div class="wk-timer-num" id="wk-timer-num">30</div>
        <div class="wk-rep-label">sec</div>
      </div>
    </div>
  </div>
</div>

<!-- REST ─────────────────────────────────────── -->
<div id="s-rest" class="screen">
  <div class="rest-wrap">
    <div class="rest-label" id="rest-label">Rest</div>
    <div class="rest-circle">
      <svg class="rest-ring" viewBox="0 0 120 120">
        <circle cx="60" cy="60" r="52" fill="none" stroke="#1e1e1e" stroke-width="6"/>
        <circle id="rest-ring-arc" cx="60" cy="60" r="52" fill="none" stroke="white" stroke-width="6"
          stroke-dasharray="327" stroke-dashoffset="0" stroke-linecap="round"
          transform="rotate(-90 60 60)"/>
      </svg>
      <div class="rest-seconds" id="rest-seconds">60</div>
    </div>
    <div class="rest-next" id="rest-next">Next: Dumbbell Row</div>
    <button class="rest-skip" onclick="skipRest()">Skip rest →</button>
  </div>
</div>

<!-- DONE ─────────────────────────────────────── -->
<div id="s-done" class="screen">
  <div class="done-wrap">
    <div class="done-check">✓</div>
    <h2 class="done-title">Session complete.</h2>
    <div class="done-stats" id="done-stats"></div>
    <button class="cta" onclick="show('s-home')">Back to home →</button>
    <button class="done-cal-btn" onclick="openCalendar()">View calendar</button>
  </div>
</div>

<!-- CALENDAR ──────────────────────────────────── -->
<div id="s-calendar" class="screen">
  <div class="cal-header">
    <button class="back-btn" onclick="show('s-home')">←</button>
    <div class="cal-nav">
      <button class="cal-arrow" onclick="calShift(-1)">‹</button>
      <span class="cal-month-label" id="cal-month-label"></span>
      <button class="cal-arrow" onclick="calShift(1)">›</button>
    </div>
    <div style="width:36px"></div>
  </div>
  <div class="cal-dow">
    <span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span><span>S</span>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
  <div class="cal-detail" id="cal-detail"></div>
</div>


<script src="workout.js"></script>
<script src="app.js"></script>
</body>
</html>
